<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin V2 Login - His Grace School</title>
  
  <!-- Typography & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom Stylesheet -->
  <link rel="stylesheet" href="assets/css/style.css">
  
  <style>
    body {
      background: radial-gradient(circle at top right, rgba(30, 58, 138, 0.05), transparent), var(--bg-slate);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    
    .login-container {
      width: 100%;
      max-width: 450px;
      background-color: var(--bg-white);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 2.5rem;
      border: 1px solid var(--border-color);
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .login-logo {
      width: 80px;
      height: 80px;
      background-color: var(--primary-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      border: 2px solid var(--accent);
      color: var(--primary);
      font-size: 2.25rem;
    }
    
    .login-header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
    
    .login-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-dark);
    }
    
    .input-wrapper {
      position: relative;
    }
    
    .input-wrapper i {
      position: absolute;
      left: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
    
    .form-control {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-sm);
      font-size: 0.95rem;
      transition: var(--transition);
      background-color: var(--bg-slate);
    }
    
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      background-color: var(--bg-white);
      box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
    }
    
    .btn-login {
      width: 100%;
      padding: 0.85rem;
      font-weight: 700;
      font-size: 1rem;
      background-color: var(--primary);
      color: #ffffff;
      border: none;
      border-radius: var(--border-radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: var(--shadow-md);
      transition: var(--transition);
    }
    
    .btn-login:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }
    
    .btn-login:disabled {
      background-color: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }
    
    .alert-box {
      padding: 1rem;
      border-radius: var(--border-radius-sm);
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .alert-danger {
      background-color: #fef2f2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
    
    .alert-success {
      background-color: #f0fdf4;
      color: #166534;
      border: 1px solid #86efac;
    }
    
    .credits {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    
    .credits i {
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">
        <i class="fa-solid fa-shield-halved"></i>
      </div>
      <h1>Administration Portal V2</h1>
      <p>Secure Administration Management Center</p>
    </div>

    <!-- Alert Message Area -->
    <div id="statusAlert" style="display: none;"></div>

    <form id="v2LoginForm">
      <div class="form-group">
        <label for="adminEmail">Operator Email Address</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="adminEmail" class="form-control" placeholder="hisgraceschool.name.ng@gmail.com" required value="hisgraceschool.name.ng@gmail.com" readonly>
        </div>
      </div>

      <div class="form-group">
        <label for="adminPassword">Master Security Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="adminPassword" class="form-control" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" id="btnLogin" class="btn-login">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In Securely
      </button>
    </form>

    <div class="credits">
      His Grace Nursery & Primary School <i class="fa-solid fa-heart"></i> V2 Security Engine
    </div>
  </div>

  <!-- Load Secure SDK -->
  <script type="module">
    import { loginAdministrator } from './assets/js/admin-v2.js';
    
    const loginForm = document.getElementById('v2LoginForm');
    const emailInput = document.getElementById('adminEmail');
    const passwordInput = document.getElementById('adminPassword');
    const btnLogin = document.getElementById('btnLogin');
    const statusAlert = document.getElementById('statusAlert');

    function showAlert(text, type = 'danger') {
      statusAlert.style.display = 'flex';
      statusAlert.className = `alert-box alert-${type}`;
      statusAlert.innerHTML = `
        <i class="fa-solid ${type === 'danger' ? 'fa-triangle-exclamation' : 'fa-circle-check'}"></i>
        <div>${text}</div>
      `;
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      
      // Strict frontend verification
      if (email !== 'hisgraceschool.name.ng@gmail.com') {
        showAlert('This email is not authorized for V2 portal access.');
        return;
      }

      try {
        btnLogin.disabled = true;
        btnLogin.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Validating Credentials...';
        statusAlert.style.display = 'none';

        const result = await loginAdministrator(email, password);
        
        if (result.success) {
          showAlert('Authorization verified. Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = 'admin-v2-dashboard.html';
          }, 1200);
        }
      } catch (err) {
        console.error(err);
        showAlert(err.message || 'Firebase Authentication failed. Check credentials.');
        btnLogin.disabled = false;
        btnLogin.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In Securely';
      }
    });
  </script>

</body>
</html>
